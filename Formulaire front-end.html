<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VestaPay | Terminal USD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

    <main class="max-w-xl mx-auto py-4 px-4">
        <div class="bg-white rounded-[2rem] shadow-2xl p-5 border border-slate-100">
            
            <div class="text-center mb-5">
                <div class="flex justify-center mb-2">
                    <img id="univLogo" src="" class="h-20 w-25 object-contain hidden">
                </div>
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic">VESTAPAY</h1>
                <p id="univName" class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1 italic">Vérification...</p>
            </div>

            <form id="vestaForm" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <select id="faculty" required class="p-2.5 rounded-xl border border-slate-200 bg-white text-[10px] font-bold outline-none">
                        <option value="" disabled selected>FACULTÉ</option>
                        <option value="Polytechnique">Polytechnique</option>
                        <option value="Droit">Droit</option>
                    </select>
                    <select id="promotion" required class="p-2.5 rounded-xl border border-slate-200 bg-white text-[10px] font-bold outline-none">
                        <option value="" disabled selected>PROMOTION</option>
                        <option value="Bac 1">Bac 1</option>
                        <option value="Bac 2">Bac 2</option>
                    </select>
                    <input type="text" id="matricule" placeholder="N° Matricule" required class="p-2.5 border border-slate-200 rounded-xl text-[10px] outline-none bg-white font-medium">
                    <input type="text" id="name" placeholder="Nom Complet" required class="p-2.5 border border-slate-200 rounded-xl text-[10px] outline-none bg-white font-medium">
                </div>

                <div class="space-y-2">
                    <h2 class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Sélection des frais (USD)</h2>
                    <div id="feesContainer" class="grid grid-cols-2 gap-2">
                        </div>
                </div>

                <div class="pt-2 space-y-2">
                    <div class="flex justify-between items-center px-4 py-2 bg-slate-50 rounded-xl border border-slate-100">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Somme brute des frais</span>
                        <span id="subtotalDisplay" class="text-xs font-black text-slate-700">0.00 $</span>
                    </div>

                    <div class="p-5 bg-slate-900 rounded-[1.8rem] text-white flex justify-between items-center shadow-xl border-b-4 border-blue-600">
                        <div>
                            <p class="text-[8px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-1">Total Net à Verser</p>
                            <h3 id="totalDisplay" class="text-2xl font-black">0.00 $</h3>
                        </div>
                        <div class="text-white/20 text-3xl italic font-black">USD</div>
                    </div>
                </div>

                <div class="py-2">
                    <p class="text-[8px] font-bold text-slate-400 uppercase text-center mb-3 tracking-widest">Modes de paiement supportés</p>
                    <div class="flex justify-center items-center gap-4 transition-all">
                        <img src="logo_m-pesa.png" alt="M-Pesa" class="h-auto w-10">
                        <img src="logo_orange.png" alt="Orange Money" class="h-auto w-10">
                        <img src="logo_airtel.png" alt="Airtel Money" class="h-auto w-10">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase text-[10px] tracking-[0.3em]">
                    Validation et mode de paiement
                </button>
            </form>
        </div>
    </main>

    <script>
        const COMMISSION = 0.027; 
        const typesFrais = [
            "Académiques", "Enrôlement", "Connexes", "Carte Étudiant",
            "Laboratoire", "Bibliothèque", "Sport/Culture", "Frais Stage",
            "Entretien", "Numérique", "Transport", "Santé"
        ];

        const container = document.getElementById('feesContainer');
        const subtotalDisplay = document.getElementById('subtotalDisplay');
        const totalDisplay = document.getElementById('totalDisplay');

        typesFrais.forEach(frais => {
            container.innerHTML += `
                <div class="flex flex-col p-2 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <span class="text-[8px] font-black text-slate-500 uppercase mb-1 truncate">${frais}</span>
                    <div class="flex items-center gap-1 bg-slate-50 rounded-md px-2 border border-slate-200">
                        <input type="number" placeholder="0" class="fee-input w-full p-1 bg-transparent font-black text-blue-600 text-[11px] outline-none">
                        <span class="text-[9px] font-bold text-slate-300">$</span>
                    </div>
                </div>
            `;
        });

        function calculerVesta() {
            let brut = 0;
            document.querySelectorAll('.fee-input').forEach(input => {
                brut += Number(input.value) || 0;
            });
            let montantFinal = brut + (brut * COMMISSION);
            subtotalDisplay.innerText = brut.toFixed(2) + " $";
            totalDisplay.innerText = montantFinal.toFixed(2) + " $";
        }
        container.addEventListener('input', calculerVesta);

        // CONFIGURATION LOGOS DYNAMIQUES
        const config = {
            "unikol": { nom: "Université de Kolwezi", logo: "logo_unikol.png" },
            "unilu": { nom: "Université de Lubumbashi", logo: "logo_unilu.png" }
        };
        const params = new URLSearchParams(window.location.search);
        const univ = config[params.get('unif') || 'unikol'];
        document.getElementById('univName').innerText = univ.nom;
        const img = document.getElementById('univLogo');
        img.src = univ.logo; img.classList.remove('hidden');

        // GESTION WEBHOOK (TRANSPORT)
        document.getElementById('vestaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Traitement sécurisé via votre opérateur mobile...");
        });
    </script>
</body>
</html>
